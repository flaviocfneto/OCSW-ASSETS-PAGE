# Deploys the docs/ folder from the PRIVATE AssetRegisterOCSW repo to GitHub Pages.
#
# How it works:
#   1. Checks out this repository (for any auxiliary files here).
#   2. Checks out the private repo into ./_private using ASSETREGISTER_PAT.
#   3. Copies _private/docs into ./_site.
#   4. Uploads ./_site as the Pages artifact and deploys it.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   ASSETREGISTER_PAT — fine-grained PAT with Contents:Read on
#                       flaviocfneto/AssetRegisterOCSW.
#
# Required Pages setting (Settings -> Pages):
#   Build and deployment -> Source = "GitHub Actions".
name: Deploy AssetRegisterOCSW docs to Pages

on:
  # Manual run from the Actions tab.
  workflow_dispatch:

  # Daily safety-net sync (00:00 UTC). Adjust or remove as needed.
  schedule:
    - cron: '0 0 * * *'

  # Push to this repo's default branch (e.g. workflow edits).
  push:
    branches: ["main"]

  # Triggered from the PRIVATE repo whenever docs/ changes.
  # Payload event_type must be "deploy-site".
  repository_dispatch:
    types: [deploy-site]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout private AssetRegisterOCSW repo
        uses: actions/checkout@v4
        with:
          repository: flaviocfneto/AssetRegisterOCSW
          token: ${{ secrets.ASSETREGISTER_PAT }}
          ref: main
          path: _private

      - name: Stage docs/ into _site
        run: |
          set -euo pipefail
          if [ ! -d "_private/docs" ]; then
            echo "::error::_private/docs not found in the private repo checkout."
            exit 1
          fi
          rm -rf _site
          mkdir -p _site
          cp -R _private/docs/. _site/
          echo "Staged files:"
          ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
