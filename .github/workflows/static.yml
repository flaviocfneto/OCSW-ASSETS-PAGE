# Builds the Vite/Preact frontend from the PRIVATE AssetRegisterOCSW repo
# (app/ folder) and deploys the built dist/ to GitHub Pages.
#
# WHILE ACTIONS ALLOWANCE IS EXHAUSTED:
#   This workflow is set to workflow_dispatch + repository_dispatch only —
#   no auto-run on push or schedule — so it does not consume minutes on
#   its own. Pages is served directly from files committed to this repo's
#   main branch (Settings -> Pages -> Source = "Deploy from a branch",
#   folder "/ (root)").
#
# TO RE-ENABLE AUTO DEPLOY:
#   1. Restore your Actions allowance.
#   2. In this repo's Settings -> Pages, switch Source back to
#      "GitHub Actions".
#   3. Uncomment the schedule / push triggers below.
#   4. In the private repo, un-comment the push filter in
#      .github/workflows/notify-pages.yml.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   ASSETREGISTER_PAT — fine-grained PAT with Contents:Read on
#                       flaviocfneto/AssetRegisterOCSW.
name: Build & deploy AssetRegisterOCSW frontend to Pages

on:
  # Manual run from the Actions tab. Safe to leave on.
  workflow_dispatch:

  # Triggered from the PRIVATE repo (event_type "deploy-site"). Safe to
  # leave on — the private-side dispatch workflow is also currently
  # manual-only.
  repository_dispatch:
    types: [deploy-site]

  # Uncomment when Actions allowance returns:
  # schedule:
  #   - cron: '0 0 * * *'
  # push:
  #   branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout private AssetRegisterOCSW repo
        uses: actions/checkout@v4
        with:
          repository: flaviocfneto/AssetRegisterOCSW
          token: ${{ secrets.ASSETREGISTER_PAT }}
          ref: main
          path: _private

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: _private/app/package-lock.json

      - name: Install & build
        working-directory: _private/app
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Stage dist/ into _site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R _private/app/dist/. _site/
          echo "Staged files:"
          ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
